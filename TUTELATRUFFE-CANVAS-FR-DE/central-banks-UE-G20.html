<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>UE + G20 Central Banks Navigator</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-image: url('../Images/europe_map_background.jpg'); /* Immagine di sfondo */
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    margin: 0;
    padding: 20px;
    color: #fff; /* Cambiato colore testo per leggibilità su sfondo scuro */
}

h1, h2 {
    text-align: center;
    color: #FFD700; /* Giallo oro per i titoli */
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
    background-color: rgba(0, 0, 0, 0.6); /* Sfondo semi-trasparente per leggibilità */
    border-radius: 15px;
}

.bank-button {
    display: flex;
    align-items: center;
    padding: 15px 20px;
    background-color: #87CEEB; /* Celeste */
    color: #000;
    text-decoration: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s ease;
    border: 2px solid #4A90E2;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

.bank-button:hover {
    transform: translateY(-3px);
    box-shadow: 0 8px 25px rgba(74, 144, 226, 0.7);
    background-color: #A0DFFF;
}

.flag-icon {
    width: 32px;
    height: 24px;
    margin-right: 15px;
    border-radius: 4px;
    border: 1px solid #fff;
    object-fit: cover;
}
.section {
    margin-top: 40px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 20px;
    margin-top: 20px;
}
.flag-card {
    background: white;
    border-radius: 10px;
    padding: 10px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    transition: transform 0.2s;
    text-decoration: none;
}
.flag-card:hover {
    transform: scale(1.05);
}
.flag-card img {
    width: 60px;
    height: auto;
    border-radius: 4px;
}
.country-name {
    margin-top: 10px;
    font-size: 14px;
    font-weight: bold;
    color: #003366;
}
</style>
</head>

<body>
<h1>UE + G20 Central Banks Navigator</h1>
<div class="container">
    <!-- Unione Europea -->
    <a href="https://www.ecb.europa.eu/home/html/index.en.html" target="_blank" class="bank-button">
        <img src="../Images/flags/eu.svg" alt="EU Flag" class="flag-icon">
        <span>European Central Bank (ECB)</span>
    </a>
    <!-- USA -->
    <a href="https://www.federalreserve.gov/" target="_blank" class="bank-button">
        <img src="../Images/flags/us.svg" alt="USA Flag" class="flag-icon">
        <span>The Federal Reserve (USA)</span>
    </a>
    <!-- UK -->
    <a href="https://www.bankofengland.co.uk/" target="_blank" class="bank-button">
        <img src="../Images/flags/gb.svg" alt="UK Flag" class="flag-icon">
        <span>Bank of England (UK)</span>
    </a>
    <!-- Canada -->
    <a href="https://www.bankofcanada.ca/" target="_blank" class="bank-button">
        <img src="../Images/flags/ca.svg" alt="Canada Flag" class="flag-icon">
        <span>Bank of Canada</span>
    </a>
    <!-- Giappone -->
    <a href="https://www.boj.or.jp/en/" target="_blank" class="bank-button">
        <img src="../Images/flags/jp.svg" alt="Japan Flag" class="flag-icon">
        <span>Bank of Japan</span>
    </a>
    <!-- Svizzera -->
    <a href="https://www.snb.ch/en/" target="_blank" class="bank-button">
        <img src="../Images/flags/ch.svg" alt="Switzerland Flag" class="flag-icon">
        <span>Swiss National Bank</span>
    </a>
    <!-- Australia -->
    <a href="https://www.rba.gov.au/" target="_blank" class="bank-button">
        <img src="../Images/flags/au.svg" alt="Australia Flag" class="flag-icon">
        <span>Reserve Bank of Australia</span>
    </a>
    <!-- Cina -->
    <a href="http://www.pbc.gov.cn/english/" target="_blank" class="bank-button">
        <img src="../Images/flags/cn.svg" alt="China Flag" class="flag-icon">
        <span>People's Bank of China</span>
    </a>
    <!-- India -->
    <a href="https://www.rbi.org.in/" target="_blank" class="bank-button">
        <img src="../Images/flags/in.svg" alt="India Flag" class="flag-icon">
        <span>Reserve Bank of India</span>
    </a>
    <!-- Russia -->
    <a href="https://www.cbr.ru/eng/" target="_blank" class="bank-button">
        <img src="../Images/flags/ru.svg" alt="Russia Flag" class="flag-icon">
        <span>Bank of Russia</span>
    </a>
    <!-- Brasile -->
    <a href="https://www.bcb.gov.br/en" target="_blank" class="bank-button">
        <img src="../Images/flags/br.svg" alt="Brazil Flag" class="flag-icon">
        <span>Banco Central do Brasil</span>
    </a>
    <!-- Sudafrica -->
    <a href="https://www.resbank.co.za/" target="_blank" class="bank-button">
        <img src="../Images/flags/za.svg" alt="South Africa Flag" class="flag-icon">
        <span>South African Reserve Bank</span>
    </a>
</div>

</body>
</html>
