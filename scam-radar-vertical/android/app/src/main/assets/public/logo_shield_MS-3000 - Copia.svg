<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 120" width="100" height="120">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Shield shape -->
  <path d="M50 5 L90 25 L90 60 Q90 100 50 115 Q10 100 10 60 L10 25 Z" 
        fill="url(#shieldGrad)" 
        stroke="#60a5fa" 
        stroke-width="3"
        filter="url(#glow)"/>
  
  <!-- Inner shield -->
  <path d="M50 15 L80 30 L80 58 Q80 90 50 102 Q20 90 20 58 L20 30 Z" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="1.5"
        opacity="0.5"/>
  
  <!-- Check mark -->
  <path d="M30 55 L45 70 L75 40" 
        fill="none" 
        stroke="#00ff7f" 
        stroke-width="6" 
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"/>
  
  <!-- € symbol -->
  <text x="50" y="95" 
        font-family="Arial, sans-serif" 
        font-size="24" 
        font-weight="bold"
        fill="#ffd700" 
        text-anchor="middle"
        filter="url(#glow)">€</text>
</svg>
